name: SDD CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout backend contract
        uses: actions/checkout@v4
        with:
          repository: michel-henri-alves/red-backend
          token: ${{ secrets.RED_BACKEND_READ_TOKEN || github.token }}
          path: red-backend
          sparse-checkout: docs/contracts/openapi.json
          sparse-checkout-cone-mode: false

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: SDD check
        run: npm run sdd:check

      - name: Backend contract check
        env:
          RED_BACKEND_OPENAPI: red-backend/docs/contracts/openapi.json
        run: npm run contracts:check

      - name: Tests
        run: npm run test

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://1biotj4t46.execute-api.us-east-1.amazonaws.com' }}
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: production
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: red-web-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build production bundle
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://1biotj4t46.execute-api.us-east-1.amazonaws.com' }}
        run: npm run build

      - name: Upload to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }} --delete \
            --cache-control "no-cache,no-store,must-revalidate"
          aws s3 sync dist/assets/ s3://${{ secrets.S3_BUCKET }}/assets/ \
            --cache-control "public,max-age=31536000,immutable"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
